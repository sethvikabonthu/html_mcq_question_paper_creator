<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School MCQ Paper Studio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header class="topbar">
        <div>
            <h1>MCQ Paper Studio</h1>
            <p>Fast paper creation for school teachers</p>
        </div>
        <div class="topbar-actions">
            <button class="btn ghost" id="importBtn">Import</button>
            <button class="btn ghost" id="exportBtn">Backup</button>
            <button class="btn ghost" id="printBtn">Print</button>
            <button class="btn primary" id="wordBtn">Word</button>
        </div>
    </header>

    <div class="app-shell">
        <aside class="paper-sidebar">
            <div class="sidebar-head">
                <span>Question Papers</span>
                <button class="icon-btn" id="newPaperBtn" title="New paper">+</button>
            </div>
            <div class="paper-list" id="paperList"></div>
        </aside>

        <main class="workspace">
            <section class="paper-setup" id="paperSetup"></section>
            <section class="section-tabs" id="sectionTabs"></section>
            <section class="question-workbench" id="questionWorkbench"></section>
        </main>

        <aside class="teacher-panel" id="teacherPanel"></aside>
    </div>

    <input type="file" id="fileInput" accept="application/json,.json" hidden />
    <div class="toast" id="toast"></div>
    <script src="script.js"></script>
</body>
</html>
